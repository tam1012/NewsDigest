# managed-by-cf-init
name = "newsdigest"
main = "worker/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 */3 * * *", "0 1 * * *"]

[[queues.producers]]
queue = "article-content-queue"
binding = "CONTENT_QUEUE"

[[queues.consumers]]
queue = "article-content-queue"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "article-content-dlq"
